# ============================================================================
# Cohort requirement — WORKED EXAMPLE (generic, health-data cohort builder)
#
# Authored in the web tool; this file IS the cohort definition. Structure:
#   each GROUP is self-contained. inclusion is a CONTAINER combined with
#   op: AND (INTERSECT, all of) or OR (UNION, any of), and may nest. exclusions
#   are an ORDERED list removed in turn.
#   Leaf condition kinds: demographic / codes / note.
# Codes are verbatim; `source` names the dataset the codes apply to.
# (Biobank sample / event-anchored selection lives on the share_cohort_builder branch.)
# ============================================================================

project: Example cohort request (edit me)
project_type: recruitment
target_n: approx. N per group
schema_version: 1
cohorts:
- name: Group A — cases
  inclusion:
    op: AND
    members:
    - kind: demographic
      label: Adults
      source: Demographics
      age_min: 18
      age_max: 80
      sex: both
    - op: OR
      label: Condition of interest (any source)
      members:
      - kind: codes
        label: Condition in hospital data
        source: hospital
        icd:
        - A00
      - kind: codes
        label: Condition in primary care
        source: primary_care
        read:
        - X1111
    - op: OR
      label: A second condition (placeholder)
      members:
      - kind: codes
        label: Second condition (primary care)
        source: primary_care
        read:
        - X2222
      - kind: codes
        label: Second condition (hospital)
        source: hospital
        icd:
        - A01
  exclusions:
  - kind: codes
    label: Comorbidity to exclude
    source: hospital
    icd:
    - B00
  - kind: note
    label: Other criterion (no code yet)
    text: Describe any criterion that has no agreed code.
- name: Group B — controls
  inclusion:
    op: AND
    members:
    - kind: demographic
      label: Adults
      source: Demographics
      age_min: 18
      age_max: 80
      sex: both
    - op: OR
      label: Condition of interest (any source)
      members:
      - kind: codes
        label: Condition in hospital data
        source: hospital
        icd:
        - A00
      - kind: codes
        label: Condition in primary care
        source: primary_care
        read:
        - X1111
  exclusions:
  - kind: codes
    label: Exclude a condition variant
    source: primary_care
    read:
    - X3333
  - kind: codes
    label: Comorbidity to exclude
    source: hospital
    icd:
    - B00
