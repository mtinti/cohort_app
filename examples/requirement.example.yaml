# ============================================================================
# Cohort requirement — WORKED EXAMPLE (generic, health-data cohort builder)
#
# Authored in the web tool; this file IS the cohort definition. Structure:
#   each GROUP is self-contained. inclusion is a CONTAINER combined with
#   op: AND (INTERSECT, all of) or OR (UNION, any of), and may nest. exclusions
#   are an ORDERED list removed in turn.
#   Leaf condition kinds: demographic / codes / measure / note (+ sample; the
#   COHORT_ENABLE_SAMPLES flag only gates the UI — the schema accepts it
#   everywhere).
# `source` names a LOGICAL source from sources.yaml (the registry); codes are
# verbatim; matching semantics (prefix, ranges) are registry-defined, so every
# site executing this contract selects the same patients.
# Every group/container/condition carries a persistent `id` so criteria stay
# addressable across versions (diffs, review comments, feasibility errors).
# This file passes the strict contract gate (check_contract == []) and
# registry conformance (check_sources == []).
# ============================================================================

project: Example cohort request (edit me)
project_type: recruitment
target_n: approx. N per group
schema_version: 2
cohorts:
- id: cd2d21d9
  name: Group A — cases
  inclusion:
    id: 87e45a57
    op: AND
    members:
    - id: 928daa71
      kind: demographic
      label: Adults
      source: demographics
      age_min: 18
      age_max: 80
    - id: f57f0f18
      op: OR
      label: Condition of interest (any source)
      members:
      - id: f0550bc7
        kind: codes
        label: Condition in hospital data
        source: hospital_admissions
        icd:
        - A00
      - id: 0b81993c
        kind: codes
        label: Condition in primary care
        source: gp_events
        read:
        - X1111
    - id: 2510ba25
      op: OR
      label: A second condition (placeholder)
      members:
      - id: aa61be82
        kind: codes
        label: Second condition (primary care)
        source: gp_events
        read:
        - X2222
      - id: 4ad90d2f
        kind: codes
        label: Second condition (hospital)
        source: hospital_admissions
        icd:
        - A01
  exclusions:
  - id: 58f16a58
    kind: codes
    label: Comorbidity to exclude
    source: hospital_admissions
    icd:
    - B00
  - id: f83a98f0
    kind: note
    label: Other criterion (no code yet)
    text: Describe any criterion that has no agreed code.
- id: ab295a31
  name: Group B — controls
  inclusion:
    id: a4a58a20
    op: AND
    members:
    - id: 67096de2
      kind: demographic
      label: Adults
      source: demographics
      age_min: 18
      age_max: 80
    - id: 8f2b2946
      op: OR
      label: Condition of interest (any source)
      members:
      - id: c1c7ee58
        kind: codes
        label: Condition in hospital data
        source: hospital_admissions
        icd:
        - A00
      - id: 6588637a
        kind: codes
        label: Condition in primary care
        source: gp_events
        read:
        - X1111
  exclusions:
  - id: d6d8b873
    kind: codes
    label: Exclude a condition variant
    source: gp_events
    read:
    - X3333
  - id: 29dc55a6
    kind: codes
    label: Comorbidity to exclude
    source: hospital_admissions
    icd:
    - B00
